<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 450" width="600" height="450">
  <defs>
    <filter id="dapple"><feGaussianBlur in="SourceGraphic" stdDeviation="6"/></filter>
    <filter id="soft"><feGaussianBlur in="SourceGraphic" stdDeviation="4"/></filter>
    <filter id="med"><feGaussianBlur in="SourceGraphic" stdDeviation="2.5"/></filter>
    <filter id="sharp"><feGaussianBlur in="SourceGraphic" stdDeviation="1.5"/></filter>
  </defs>

  <!-- ===== SURFACE — linen base ===== -->
  <rect width="600" height="450" fill="#e8e0d4"/>

  <!-- ===== KOMOREBI — dappled sunlight patches ===== -->
  <!-- Smaller, more defined patches — soft edges but visible shapes -->

  <!-- Patch 1: upper-left, large -->
  <path d="M 10,40 C 60,10 140,25 190,15 C 240,5 270,40 250,80
           C 230,120 170,140 110,130 C 50,120 0,90 0,60 Z"
        fill="#f8f5f0" opacity="0.65" filter="url(#dapple)"/>

  <!-- Patch 2: center-left, medium -->
  <path d="M 30,160 C 70,140 140,150 170,180 C 200,210 170,250 120,255
           C 70,260 20,230 15,200 C 10,170 10,170 30,160 Z"
        fill="#f8f5f0" opacity="0.55" filter="url(#dapple)"/>

  <!-- Patch 3: between objects -->
  <path d="M 200,200 C 240,185 280,195 290,225 C 300,255 270,275 230,275
           C 190,275 170,245 175,220 C 180,200 185,205 200,200 Z"
        fill="#f8f5f0" opacity="0.45" filter="url(#dapple)"/>

  <!-- Patch 4: across saucer area (light falling on the object) -->
  <path d="M 320,140 C 380,120 440,140 460,180 C 480,220 450,250 400,255
           C 350,260 310,230 310,195 C 310,160 290,150 320,140 Z"
        fill="#f8f5f0" opacity="0.35" filter="url(#dapple)"/>

  <!-- Patch 5: small, near box -->
  <path d="M 80,290 C 120,275 165,285 170,310 C 175,335 140,350 100,345
           C 60,340 50,310 80,290 Z"
        fill="#f8f5f0" opacity="0.35" filter="url(#dapple)"/>

  <!-- Deeper shadow pools -->
  <path d="M 470,310 C 520,295 570,320 590,370 C 600,410 570,440 520,440
           C 470,440 440,400 450,360 C 455,330 450,315 470,310 Z"
        fill="#c9b9a8" opacity="0.4" filter="url(#dapple)"/>
  <path d="M 0,370 C 30,355 70,370 60,410 C 50,440 0,450 0,410 Z"
        fill="#c9b9a8" opacity="0.35" filter="url(#dapple)"/>
  <!-- Shadow pool upper-right -->
  <path d="M 500,60 C 540,50 580,70 590,110 C 600,150 570,170 540,160
           C 510,150 490,120 490,90 C 490,70 490,65 500,60 Z"
        fill="#c9b9a8" opacity="0.3" filter="url(#dapple)"/>

  <!-- ===== LEAF SHADOW SCALLOPS below shelf ===== -->
  <path d="M 150,36 Q 172,72 194,38 Q 218,72 242,36 Q 266,70 290,38
           Q 314,72 338,36 Q 362,68 386,38 Q 408,72 430,36
           Q 454,68 478,38 Q 500,70 522,36 L 595,36 L 150,36 Z"
        fill="#c9b9a8" opacity="0.4" filter="url(#soft)"/>

  <!-- ===== DARK SHELF BAR ===== -->
  <rect x="190" y="6" width="405" height="30" fill="#3a2f24" rx="2"/>

  <!-- ===== RECTANGULAR BLOCK ===== -->
  <!-- Shadow (cast to lower-right, warm, visible) -->
  <path d="M 170,318 L 290,318 L 320,380 L 200,380 Z"
        fill="#5a4a38" opacity="0.18" filter="url(#soft)"/>

  <!-- Top face -->
  <rect x="72" y="258" width="180" height="45" fill="#c9b9a8" rx="3"/>
  <!-- Warm tint on top face where light hits -->
  <rect x="72" y="258" width="120" height="45" fill="#d4943a" opacity="0.06" rx="3"/>
  <!-- Front face -->
  <rect x="72" y="303" width="180" height="16" fill="#8a7355" opacity="0.4" rx="1"/>
  <!-- Top edge highlight -->
  <line x1="72" y1="258" x2="252" y2="258" stroke="#e8e0d4" stroke-width="1.5" opacity="0.5"/>

  <!-- ===== 壶承 SAUCER — large, dark, warm brown ===== -->
  <!-- Saucer shadow on surface -->
  <ellipse cx="408" cy="228" rx="112" ry="102"
           fill="#5a4a38" opacity="0.15" transform="translate(16,16)" filter="url(#soft)"/>

  <!-- Saucer body -->
  <ellipse cx="400" cy="218" rx="115" ry="105" fill="#5a4a38"/>
  <!-- Dappled light modulating the saucer — warmer strip where light crosses -->
  <path d="M 345,175 C 380,160 430,170 450,200 C 470,230 445,265 405,270
           C 365,275 340,250 340,215 C 340,185 325,180 345,175 Z"
        fill="#8a7355" opacity="0.3" filter="url(#med)"/>

  <!-- ===== TEAPOT — warm, golden-toned, NOT white ===== -->
  <!-- Use bronze as base for warmth, lightened with overlay -->
  <ellipse cx="365" cy="195" rx="84" ry="77" fill="#8a7355"/>
  <!-- Lighter warm overlay to bring it above the saucer value -->
  <ellipse cx="365" cy="195" rx="84" ry="77" fill="#c9b9a8" opacity="0.5"/>
  <!-- Warm golden tint -->
  <ellipse cx="365" cy="195" rx="84" ry="77" fill="#d4943a" opacity="0.08"/>
  <!-- Light hitting upper portion -->
  <ellipse cx="352" cy="180" rx="50" ry="40" fill="#e8e0d4" opacity="0.2" filter="url(#med)"/>
  <!-- Shadow on lower portion -->
  <ellipse cx="385" cy="220" rx="50" ry="30" fill="#5a4a38" opacity="0.15" filter="url(#med)"/>

  <!-- Subtle lid indication — just a faint line, not a bullseye -->
  <ellipse cx="365" cy="195" rx="38" ry="34" fill="none"
           stroke="#5a4a38" stroke-width="0.8" opacity="0.2"/>

  <!-- ===== TEA CUP — amber focal point ===== -->
  <!-- Cup shadow on saucer (clearly visible) -->
  <ellipse cx="418" cy="190" rx="22" ry="18"
           fill="#3a2f24" opacity="0.2" transform="translate(8,8)" filter="url(#med)"/>

  <!-- Cup exterior — warm amber bowl -->
  <circle cx="413" cy="185" r="26" fill="#d4943a"/>
  <!-- Shadow side of bowl (lower-left) -->
  <circle cx="413" cy="185" r="26" fill="none"/>
  <path d="M 392,200 C 386,192 387,175 394,166 C 390,178 389,192 392,200 Z"
        fill="#5a4a38" opacity="0.35"/>

  <!-- Ceramic rim -->
  <circle cx="413" cy="185" r="26" fill="none" stroke="#f0ebe5" stroke-width="1.5" opacity="0.4"/>
  <!-- Bright rim catch on lit side -->
  <path d="M 426,164 C 434,168 439,176 438,184"
        fill="none" stroke="#f0ebe5" stroke-width="2.5" opacity="0.65" stroke-linecap="round"/>

  <!-- Tea liquid -->
  <circle cx="413" cy="185" r="17" fill="#d4943a"/>
  <!-- Center -->
  <circle cx="413" cy="185" r="2.5" fill="#3a2f24" opacity="0.6"/>
</svg>
