name: Release

on:
  push:
    branches: [master]

# changesets/action opens/updates the "Version Packages" PR (needs
# pull-requests: write) and pushes version commits (contents: write).
# id-token: write lets npm attach build provenance to the published tarballs.
permissions:
  contents: write
  pull-requests: write
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      # Setup steps mirror .github/workflows/ci.yml exactly.
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - uses: changesets/action@v1
        with:
          # `pnpm release` runs `changeset publish`. Invoking through pnpm makes
          # changesets publish with `pnpm publish`, which rewrites the
          # `workspace:` and `catalog:` protocol specifiers into real version
          # ranges at pack time — so the published tarballs are portable.
          publish: pnpm release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          # Emit npm provenance (requires the id-token: write permission above).
          NPM_CONFIG_PROVENANCE: true
