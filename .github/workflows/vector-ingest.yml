name: Vector Ingest

on:
  schedule:
    - cron: '0 6 * * *'   # Daily at 06:00 UTC
    - cron: '0 4 1 * *'   # 1st of each month at 04:00 UTC
  workflow_dispatch:

permissions:
  contents: read

jobs:
  ingest:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - name: Run full ingestion (monthly)
        if: github.event.schedule == '0 4 1 * *'
        run: pnpm ingest:vector
        env:
          TMDB_API_TOKEN: ${{ secrets.TMDB_API_TOKEN }}
          UPSTASH_VECTOR_REST_URL: ${{ secrets.UPSTASH_VECTOR_REST_URL }}
          UPSTASH_VECTOR_REST_TOKEN: ${{ secrets.UPSTASH_VECTOR_REST_TOKEN }}
      - name: Run incremental ingestion (daily)
        if: github.event.schedule != '0 4 1 * *'
        run: pnpm ingest:vector --incremental --days=1
        env:
          TMDB_API_TOKEN: ${{ secrets.TMDB_API_TOKEN }}
          UPSTASH_VECTOR_REST_URL: ${{ secrets.UPSTASH_VECTOR_REST_URL }}
          UPSTASH_VECTOR_REST_TOKEN: ${{ secrets.UPSTASH_VECTOR_REST_TOKEN }}
