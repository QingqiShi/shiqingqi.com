name: Playwright Tests
on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

# Cancel superseded runs on the same ref (e.g. rapid pushes to a PR).
concurrency:
  group: playwright-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Build the web app once and share the output with every test shard, instead
  # of rebuilding it inside each shard's Playwright webServer.
  build:
    permissions:
      contents: read
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
    - uses: actions/checkout@v7
    - uses: pnpm/action-setup@v6
    - uses: actions/setup-node@v6
      with:
        node-version: '24'
        cache: 'pnpm'
    - name: Install dependencies
      run: pnpm install --frozen-lockfile
    - name: Build web app
      working-directory: apps/web
      run: pnpm build
      env:
        TMDB_API_TOKEN: ${{ secrets.TMDB_API_TOKEN }}
    - name: Upload build output
      uses: actions/upload-artifact@v7
      with:
        name: web-build
        # `next start` serves from `.next`; `public` carries the generated
        # service worker and hashed PWA icons.
        path: |
          apps/web/.next
          apps/web/public
        include-hidden-files: true
        retention-days: 1

  test:
    needs: [build]
    permissions:
      contents: read
    timeout-minutes: 60
    runs-on: ubuntu-latest
    container:
      image: mcr.microsoft.com/playwright:v1.61.0-noble
    strategy:
      fail-fast: false
      matrix:
        shardIndex: [1, 2, 3, 4, 5, 6, 7]
        shardTotal: [7]
    steps:
    - uses: actions/checkout@v7
    - uses: pnpm/action-setup@v6
    - uses: actions/setup-node@v6
      with:
        node-version: '24'
        cache: 'pnpm'
    - name: Install dependencies
      run: pnpm install --frozen-lockfile
    - name: Download prebuilt web app
      uses: actions/download-artifact@v8
      with:
        name: web-build
        path: apps/web
    - name: Run Playwright tests
      working-directory: apps/web
      # webServer runs `pnpm start` on CI (see playwright.config.ts); the app is
      # already built by the `build` job above.
      run: pnpm exec playwright test --shard=${{ matrix.shardIndex }}/${{ matrix.shardTotal }}
      env:
        TMDB_API_TOKEN: ${{ secrets.TMDB_API_TOKEN }}
        OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        OPENAI_MODEL: ${{ vars.OPENAI_MODEL }}
    - name: Upload blob report to GitHub Actions Artifacts
      if: ${{ !cancelled() }}
      uses: actions/upload-artifact@v7
      with:
        name: blob-report-${{ matrix.shardIndex }}
        path: apps/web/blob-report
        retention-days: 1

  merge-reports:
    permissions:
      contents: read
    if: ${{ !cancelled() }}
    needs: [test]
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v7
    - uses: pnpm/action-setup@v6
    - uses: actions/setup-node@v6
      with:
        node-version: '24'
        cache: 'pnpm'
    - name: Install dependencies
      run: pnpm install --frozen-lockfile
    - name: Download blob reports from GitHub Actions Artifacts
      uses: actions/download-artifact@v8
      with:
        path: all-blob-reports
        pattern: blob-report-*
        merge-multiple: true
    - name: Merge into HTML Report
      working-directory: apps/web
      run: pnpm exec playwright merge-reports --reporter html ../../all-blob-reports
    - name: Upload HTML report
      uses: actions/upload-artifact@v7
      with:
        name: playwright-report
        path: apps/web/playwright-report
        retention-days: 30
