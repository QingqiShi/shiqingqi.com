name: CI

on:
  pull_request:
    branches: [main, master]
  push:
    branches: [main, master]

permissions:
  contents: read

# Cancel superseded runs on the same ref (e.g. rapid pushes to a PR).
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# Turborepo remote cache. Unchanged codegen/tsc/lint/test tasks become cache
# hits shared across matrix jobs and across runs. Inert until the repo sets a
# TURBO_TOKEN secret and TURBO_TEAM variable (see below), so it's safe to land.
env:
  TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
  TURBO_TEAM: ${{ vars.TURBO_TEAM }}

jobs:
  ci:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        task: [test, format, lint, tsc]
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm test
        if: matrix.task == 'test'
      - run: pnpm format:check
        if: matrix.task == 'format'
      - run: pnpm codegen
        if: matrix.task == 'lint'
      - run: pnpm --filter web exec next typegen
        if: matrix.task == 'lint'
      - run: pnpm lint
        if: matrix.task == 'lint'
      - run: pnpm codegen
        if: matrix.task == 'tsc'
      - run: pnpm --filter web exec next typegen
        if: matrix.task == 'tsc'
      - run: pnpm build:tsc
        if: matrix.task == 'tsc'