name: CI

on:
  pull_request:
    branches: [main, master]
  push:
    branches: [main, master]

permissions:
  contents: read

jobs:
  ci:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        task: [test, format, lint]
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm test
        if: matrix.task == 'test'
      - run: pnpm format:check
        if: matrix.task == 'format'
      - run: pnpm codegen
        if: matrix.task == 'lint'
      - run: pnpm --filter @qi/site exec next typegen
        if: matrix.task == 'lint'
      - run: pnpm lint
        if: matrix.task == 'lint'