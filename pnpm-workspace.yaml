packages:
  - "apps/*"
  - "packages/*"
allowBuilds:
  esbuild: false
  msw: false
  sharp: false
  unrs-resolver: false
# Security overrides for transitive dependencies flagged by Dependabot. Each
# pins the first patched version within the existing major. Remove an entry once
# the direct dependency that pulls it in advances past the patched version.
overrides:
  undici: "^7.28.0"
  js-yaml: "^4.2.0"
  postcss: "^8.5.10"
catalog:
  "@babel/core": 8.0.1
  "@babel/parser": ^8.0.4
  "@babel/preset-env": ^8.0.2
  "@babel/preset-react": ^8.0.1
  "@babel/preset-typescript": ^8.0.1
  "@babel/traverse": ^8.0.4
  "@babel/types": ^8.0.4
  "@rolldown/plugin-babel": ^0.2.3
  "@serwist/cli": ^9.5.11
  "@serwist/next": ^9.5.11
  "@stylexjs/babel-plugin": ^0.19.0
  "@stylexjs/stylex": ^0.19.0
  "@testing-library/jest-dom": ^6.9.1
  "@testing-library/react": ^16.3.2
  "@testing-library/user-event": ^14.6.1
  "@types/babel__traverse": ^7.28.0
  "@types/node": ^26.1.0
  "@types/react": 19.2.17
  "@types/react-dom": 19.2.3
  "@upstash/vector": ^1.2.3
  "@vercel/analytics": ^2.0.1
  "@vercel/speed-insights": 2.0.0
  "@vitejs/plugin-react": ^6.0.3
  babel-plugin-react-compiler: 19.0.0-beta-714736e-20250131
  dotenv: ^17.4.2
  eslint: ^10.7.0
  jsdom: ^29.1.1
  next: 16.2.10
  prettier: ^3.9.5
  react: 19.3.0-canary-56824423-20260414
  react-dom: 19.3.0-canary-56824423-20260414
  react-remove-scroll: ^2.7.2
  serwist: ^9.5.11
  tsx: ^4.23.1
  # Per the TypeScript 7.0 announcement: the bare `typescript` name resolves to
  # the 6.0-compatible API package so every tool that imports `typescript` via a
  # peer dependency (typescript-eslint, openapi-typescript, Next's checker, our
  # codegen) keeps working. The native TS 7 compiler is installed under the
  # `@typescript/native` alias and provides the fast `tsc` used by `build:tsc`.
  typescript: "npm:@typescript/typescript6@^6.0.2"
  "@typescript/native": "npm:typescript@^7.0.2"
  vite: ^8.1.5
  vitest: ^4.1.10
  zod: "4"
minimumReleaseAgeExclude:
  - "@typescript/typescript-aix-ppc64@7.0.2"
  - "@typescript/typescript-darwin-arm64@7.0.2"
  - "@typescript/typescript-darwin-x64@7.0.2"
  - "@typescript/typescript-freebsd-arm64@7.0.2"
  - "@typescript/typescript-freebsd-x64@7.0.2"
  - "@typescript/typescript-linux-arm64@7.0.2"
  - "@typescript/typescript-linux-arm@7.0.2"
  - "@typescript/typescript-linux-loong64@7.0.2"
  - "@typescript/typescript-linux-mips64el@7.0.2"
  - "@typescript/typescript-linux-ppc64@7.0.2"
  - "@typescript/typescript-linux-riscv64@7.0.2"
  - "@typescript/typescript-linux-s390x@7.0.2"
  - "@typescript/typescript-linux-x64@7.0.2"
  - "@typescript/typescript-netbsd-arm64@7.0.2"
  - "@typescript/typescript-netbsd-x64@7.0.2"
  - "@typescript/typescript-openbsd-arm64@7.0.2"
  - "@typescript/typescript-openbsd-x64@7.0.2"
  - "@typescript/typescript-sunos-x64@7.0.2"
  - "@typescript/typescript-win32-arm64@7.0.2"
  - "@typescript/typescript-win32-x64@7.0.2"
  - typescript@7.0.2
